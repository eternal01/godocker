#--------------------------------------------------------------------------
# Core Compose - Workspace Only
#--------------------------------------------------------------------------
# 此文件仅包含 workspace 服务、网络和核心缓存卷定义。
# 所有基础设施服务已拆分到 compose/*.yml 中，按需组合启动。
#
# 用法示例:
#   docker compose up -d                          # 仅启动 workspace
#   docker compose -f docker-compose.yml -f compose/db.yml up -d
#--------------------------------------------------------------------------

networks:
  frontend:
    driver: ${NETWORKS_DRIVER}
  backend:
    driver: ${NETWORKS_DRIVER}

volumes:
  workspace-mise-cache:
    driver: ${VOLUMES_DRIVER}
  workspace-mise-data:
    driver: ${VOLUMES_DRIVER}
  workspace-brew:
    driver: ${VOLUMES_DRIVER}
  workspace-cargo-registry:
    driver: ${VOLUMES_DRIVER}
  workspace-cargo-git:
    driver: ${VOLUMES_DRIVER}
  workspace-go-mod:
    driver: ${VOLUMES_DRIVER}
  workspace-composer:
    driver: ${VOLUMES_DRIVER}
  mysql:
    driver: ${VOLUMES_DRIVER}
  redis:
    driver: ${VOLUMES_DRIVER}
  mongo:
    driver: ${VOLUMES_DRIVER}
  minio:
    driver: ${VOLUMES_DRIVER}
  elasticsearch:
    driver: ${VOLUMES_DRIVER}
  postgres:
    driver: ${VOLUMES_DRIVER}

services:

  ### Workspace #############################################
  workspace:
    build:
      context: .
      dockerfile: workspaces/base.Dockerfile
      # `network: host` lets the build container reach the host's proxy on
      # 127.0.0.1 (otherwise it would resolve to the container's own loopback).
      # Leave unset in environments where you don't want the build to share
      # the host's network namespace.
      network: host
      args:
        - SYSTEM_NAME=${SYSTEM_NAME}
        - SYSTEM_VERSION=${SYSTEM_VERSION}
        - WORKSPACE_USER=${WORKSPACE_USER}
        - WORKSPACE_HOME=${WORKSPACE_HOME}
        - WORKSPACE_PATH=${APP_CODE_PATH_CONTAINER}
        - WORKSPACE_INSTALL_BREW=${WORKSPACE_INSTALL_BREW}
        - WORKSPACE_PREINSTALL_LANGUAGES=${WORKSPACE_PREINSTALL_LANGUAGES}
        - WORKSPACE_INSTALL_DNSUTILS=${WORKSPACE_INSTALL_DNSUTILS}
        - WORKSPACE_INSTALL_WORKSPACE_SSH=${WORKSPACE_INSTALL_WORKSPACE_SSH}
        - WORKSPACE_BREW_PACKAGES=${WORKSPACE_BREW_PACKAGES}
        - PUID=${WORKSPACE_PUID}
        - PGID=${WORKSPACE_PGID}
        - TZ=${TZ}
        - HTTP_PROXY=${HTTP_PROXY}
        - HTTPS_PROXY=${HTTPS_PROXY}
        - NO_PROXY=${NO_PROXY}
    volumes:
      - ${APP_CODE_PATH_HOST}:${APP_CODE_PATH_CONTAINER}${APP_CODE_CONTAINER_FLAG}
      # mise data, shims, and cache
      - workspace-mise-data:${WORKSPACE_HOME}/.local/share/mise
      - workspace-mise-cache:${WORKSPACE_HOME}/.cache/mise
      # language-specific caches
      - workspace-go-mod:${WORKSPACE_HOME}/go/pkg/mod
      - workspace-cargo-registry:${WORKSPACE_HOME}/.cargo/registry
      - workspace-cargo-git:${WORKSPACE_HOME}/.cargo/git
      - workspace-composer:${WORKSPACE_HOME}/.composer
      # homebrew installations
      - workspace-brew:/home/linuxbrew/.linuxbrew
    extra_hosts:
      - "dockerhost:${DOCKER_HOST_IP}"
      # Allow workspace to reach a proxy on the host (when not using host network).
      - "host.docker.internal:host-gateway"
    environment:
      # Propagate proxy to go install / pip / brew / curl / etc. inside the
      # container. Default in .env is empty, which disables the proxy.
      - HTTP_PROXY=${HTTP_PROXY}
      - HTTPS_PROXY=${HTTPS_PROXY}
      - NO_PROXY=${NO_PROXY}
      - http_proxy=${HTTP_PROXY}
      - https_proxy=${HTTPS_PROXY}
      - no_proxy=${NO_PROXY}
    ports:
      - "${WORKSPACE_SSH_PORT}:22"
      - "${WORKSPACE_SERVE_HOST_PORT}:1080"
    tty: true
    networks:
      - frontend
      - backend
    restart: always
