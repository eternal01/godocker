#--------------------------------------------------------------------------
# Logstash Pipeline (Sample)
#--------------------------------------------------------------------------
# Default pipeline: receives events from Beats/Filebeat on 5044
# and forwards them to Elasticsearch.
#
# Customise / replace as needed; the file is bind-mounted into the
# logstash container via compose/observability.yml.
#--------------------------------------------------------------------------

input {
  beats {
    port => 5044
  }
}

filter {
  # Add your filters here, e.g.:
  # if [container][image] {
  #   mutate { add_field => { "[@metadata][target_index]" => "logs-%{[container][image]}-%{+YYYY.MM.dd}" } }
  # }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
  }

  # Useful for local development: also print to stdout
  # Comment out in production.
  stdout {
    codec => rubydebug
  }
}
