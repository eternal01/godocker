#--------------------------------------------------------------------------
# Cache Services
# Includes: Redis
#--------------------------------------------------------------------------

services:
  ### Redis ################################################
  redis:
    profiles: ["cache", "redis", "go-env", "rust-env", "php-env", "ci"]
    build:
      context: ./redis
      dockerfile: Dockerfile
      args:
        - REDIS_VERSION=${REDIS_VERSION}
    volumes:
      - ${DATA_PATH_HOST}/redis:/data
    command: --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: always
